name: Notebook

# Daily "interesting-work" scout (01:30 SGT / 17:30 UTC):
# gather (org PUBLIC repos in full, linkable detail; PRIVATE work reduced to
# anonymized category counts inside the script) → curate (one Haiku call,
# idea-seeds grounded only in those facts) → validate (the SOLE gate before a
# seed becomes a public issue: hard-fails on any private blocklist identifier,
# email/@handle, or off-allowlist URL) → publish each passing seed as a PUBLIC
# GitHub issue labeled `field-note-seed` in THIS repo. See scripts/notebook/*.
#
# Seeds are sanitized, public-work-derived angles, so a public issue is safe.
# The issue lifecycle is the retention mechanism: open = pending candidate,
# closed = used by a field note (the weekly field-notes workflow closes the
# seeds it draws on). This replaced the old PRIVATE DO Spaces notebook object;
# farm-feed keeps its bucket, the notebook no longer uses one.
#
# The validator is what keeps seeds leak-free, locked by
# scripts/notebook/validate.test.mjs (run via `npm test` in CI).
#
# Missing any secret → the relevant step no-ops (exit 0) and no issue is
# created, so the workflow stays green until both are wired up:
#   FEED_GITHUB_PAT · OPENAI_API_KEY
# (publish uses the built-in GITHUB_TOKEN — no extra secret needed.)

on:
  schedule:
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: notebook
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FEED_GITHUB_PAT: ${{ secrets.FEED_GITHUB_PAT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Gather (public detail + anonymized private aggregate)
        run: node scripts/notebook/gather.mjs notebook-raw.json

      - name: Curate (one LLM call — idea-seeds grounded in the facts)
        run: node scripts/notebook/curate.mjs notebook-raw.json seeds.json

      - name: Validate (the sole gate before a seed becomes a public issue)
        run: |
          if [ ! -f notebook-raw.json ]; then
            echo "notebook-raw.json absent (gather no-op'd — no PAT) — skipping."
            exit 0
          fi
          if [ ! -f seeds.json ]; then
            echo "seeds.json absent (curate no-op'd — no OPENAI_API_KEY) — skipping."
            exit 0
          fi
          node scripts/notebook/validate.mjs notebook-raw.json seeds.json validated-seeds.json

      - name: Publish seeds as field-note-seed issues (dedup against open ones)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/notebook/publish.mjs validated-seeds.json
