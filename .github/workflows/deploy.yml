name: Deploy

# Tracks the DigitalOcean production deployment after a main-branch push.
# rarebit-static-v3 is a DO App Platform *static site* that auto-deploys from
# `main` via DO's GitHub integration; this workflow doesn't deploy — it polls
# the DO API until that deployment goes live (or fails) so the result is a
# visible CI signal (and a GitHub Deployment for the /land + status tooling).
#
# Triggers on the CI workflow completing for a main push (workflow_run), so CI
# runs exactly once and this inherits its conclusion. ci.yml must be on `main`
# for workflow_run to fire.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: read
  # deployments: write must be granted here so the reusable tracker — which
  # declares an `environment:` — can be granted it in turn (a called workflow's
  # token is capped by the caller's permissions). Likewise pull-requests: write,
  # which the tracker needs for its merged-PR status comment — omitting it here
  # makes the reusable-workflow call fail at startup.
  deployments: write
  pull-requests: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # Open the Slack thread root for this production deploy. Runs only when the
  # triggering CI run succeeded (same gate as check-tracking). The outcome reply
  # is posted by narrate-outcome once tracking finishes. Fail-soft throughout.
  narrate-start:
    name: Slack — narrate start
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      thread_ts: ${{ steps.slack.outputs.thread_ts }}
    steps:
      - name: Slack — narrate start (thread root)
        id: slack
        continue-on-error: true
        uses: rarebit-one/.github/.github/actions/slack-deploy-thread@main
        with:
          bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel: ${{ vars.SLACK_STATIC_V3_CHANNEL_ID }}
          mode: start
          text: "🧪 *Production deploy started* — `${{ github.repository }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|run log>"

  check-tracking:
    name: Check DO tracking config
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      has_app_id: ${{ steps.check.outputs.has_app_id }}
    steps:
      - name: Check if DO tracking is configured
        id: check
        env:
          DO_APP_ID: ${{ secrets.DO_APP_ID }}
        run: |
          if [ -n "$DO_APP_ID" ]; then
            echo "has_app_id=true" >> "$GITHUB_OUTPUT"
            echo "DO app ID is configured"
          else
            echo "has_app_id=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DO_APP_ID not configured — skipping deployment tracking"
          fi

  track-deployment:
    name: Production
    needs: check-tracking
    if: ${{ needs.check-tracking.outputs.has_app_id == 'true' }}
    uses: ./.github/workflows/track-do-deployment.yml
    with:
      environment: production
      environment_url: https://rarebit.one
      # Under workflow_run, github.sha is this workflow file's commit, not the
      # triggering CI run's commit — use the workflow_run head_sha.
      expected_commit_sha: ${{ github.event.workflow_run.head_sha }}
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      DIGITALOCEAN_APP_ID: ${{ secrets.DO_APP_ID }}

  # Post the outcome reply into the deploy thread. Runs always (so a failed or
  # skipped tracker still narrates), but only when the thread root was opened.
  narrate-outcome:
    name: Slack — narrate outcome
    needs: [narrate-start, check-tracking, track-deployment]
    if: ${{ always() && needs.narrate-start.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Slack — narrate outcome (thread reply)
        continue-on-error: true
        uses: rarebit-one/.github/.github/actions/slack-deploy-thread@main
        with:
          bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel: ${{ vars.SLACK_STATIC_V3_CHANNEL_ID }}
          mode: reply
          thread_ts: ${{ needs.narrate-start.outputs.thread_ts }}
          text: >-
            ${{ needs.track-deployment.result == 'success' && format('✅ production deploy live — <{0}|rarebit.one>', 'https://rarebit.one')
            || (needs.track-deployment.result == 'skipped' && format('ℹ️ deploy tracking not configured (no DO_APP_ID) — <{0}/{1}/actions/runs/{2}|run log>', github.server_url, github.repository, github.run_id))
            || format('🔴 production deploy failed — <{0}/{1}/actions/runs/{2}|run log>', github.server_url, github.repository, github.run_id) }}
