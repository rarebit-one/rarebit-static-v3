name: Voice evolution

# Weekly bounded evolution of the farm's canonical voice (VOICE.md).
# Sun 21:00 UTC — deliberately BEFORE field-notes (Sun 22:00 UTC), so a voice
# nudge that lands can inform that week's note.
#
# gather (public frontier-lab signal — robust, per-source try/catch, no secret)
# → draft (one OpenAI chat-completions call, model = OPENAI_MODEL repo var,
# default gpt-4o: a SMALL, surgical proposal grounded in the
# current VOICE.md + that signal) → validate (the bounded-diff gate: hard-fails
# on a rewrite, a dropped invariant, a gimmicky phrase, or a source leaking into
# the VOICE-HEADER; on pass it prepends one dated changelog entry and writes the
# new VOICE.md). If VOICE.md changed, open an AUTO-LAND PR so the change is
# auditable + revertable via the diff and the changelog. The gate is locked by
# scripts/voice/validate.test.mjs (run via `npm test` in CI).
#
# Missing any secret → the relevant step no-ops (exit 0) and nothing is opened,
# so the workflow stays green until both are wired up:
#   OPENAI_API_KEY (draft) · AUTOLAND_PAT (checkout token + gh pr create)
#
# The `auto-land` label is created later by Phase 1's enable.sh; until then this
# workflow is effectively dormant (it no-ops on the missing key / PAT).

on:
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: voice-evolution
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
    steps:
      # Use AUTOLAND_PAT as the checkout token so the branch push is authored by
      # a real PAT — that's what makes CI + review trigger on the opened PR.
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.AUTOLAND_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Gather (public frontier-lab signal)
        run: node scripts/voice/gather.mjs signal.json

      - name: Draft (one LLM call — a small, bounded proposal)
        run: node scripts/voice/draft.mjs VOICE.md signal.json proposal.json

      - name: Validate (the bounded-diff gate; writes VOICE.md only on pass)
        run: |
          if [ ! -f proposal.json ]; then
            echo "proposal.json absent (no key or empty signal) — skipping."
            exit 0
          fi
          node scripts/voice/validate.mjs VOICE.md proposal.json VOICE.md

      - name: Open auto-land PR (if the voice changed)
        env:
          GH_TOKEN: ${{ secrets.AUTOLAND_PAT }}
        run: |
          if [ -z "$(git status --porcelain VOICE.md)" ]; then
            echo "VOICE.md unchanged (no proposal, thin signal, or gate rejected) — nothing to open."
            exit 0
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "AUTOLAND_PAT not set — voice evolved locally but cannot open a PR. No-op."
            git checkout -- VOICE.md
            exit 0
          fi
          # Append the run id so a same-day re-run can't collide on the branch.
          branch="voice/$(date +%Y-%m-%d)-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add VOICE.md
          git commit -m "Voice: weekly evolution"
          git push --set-upstream origin "$branch"
          # Ensure the `auto-land` label exists so `gh pr create --label` can't
          # fail the run if the label was never bootstrapped (enable.sh).
          gh label create auto-land --color "0E8A16" --description "Opt this PR into gated auto-merge once green + review-clear" --force || true
          gh pr create \
            --title "Voice: weekly evolution ($(date +%Y-%m-%d))" \
            --body "Weekly bounded evolution of VOICE.md, proposed from this week's public frontier-lab signal and held to a small, structure-preserving diff by \`scripts/voice/validate.mjs\`. The new changelog entry at the top of VOICE.md describes the nudge; revert by reverting this PR." \
            --label auto-land \
            --base main \
            --head "$branch"
