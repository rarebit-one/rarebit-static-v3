name: Site freshness

# Phase 5 of the autonomy program (#33). A weekly drift sweep that keeps the
# public site honest as the farm's real capabilities change — and opens an
# AUTO-LAND PR with the bounded fix:
#   gather (read the worktree — workflow filenames as capability signals, the
#     page inventory, the checkable static claims in src/data/site.ts, and every
#     field note with its FULL body) → draft (one OpenAI chat-completions call,
#     model = OPENAI_MODEL repo var, default gpt-4o: propose a
#     small, bounded patch — copyEdits for stale static copy, and APPEND-ONLY
#     addenda for drifted field notes) → validate (the gate: applies the patch
#     ONLY if every check passes, and ENFORCES that a field note's original prose
#     is preserved BYTE-FOR-BYTE — an addendum may only append a new "## Update"
#     section; locked by scripts/freshness/validate.test.mjs via `npm test`).
#
# If validate changed the working tree, a branch + PR labeled `auto-land` is
# opened (the same lifecycle as the other autonomous workflows: a human-reviewed,
# then auto-merged change — no human authors the edit). Phase 1's enable.sh
# creates the `auto-land` label; this workflow is dormant until then.
#
# Missing any secret → the relevant step no-ops (exit 0) and no PR is opened, so
# the workflow stays green until all are wired up:
#   FEED_GITHUB_PAT (optional — local reads work without it; only live facts use
#     it) · OPENAI_API_KEY (draft) · AUTOLAND_PAT (open the PR as a bot that
#     can trigger downstream checks)

on:
  schedule:
    # Saturday 22:00 UTC — away from field-notes (Sun 22:00) and farm-feed.
    - cron: "0 22 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: site-freshness
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FEED_GITHUB_PAT: ${{ secrets.FEED_GITHUB_PAT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Check out with the auto-land PAT so the push + PR are attributed to
          # the bot and can trigger downstream checks. Falls back to the default
          # token when the PAT isn't set (push works; PR-open step no-ops).
          token: ${{ secrets.AUTOLAND_PAT || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Gather (read the worktree → state.json)
        run: node scripts/freshness/gather.mjs state.json

      - name: Draft (one LLM call — bounded patch proposal)
        run: node scripts/freshness/draft.mjs state.json patch.json

      - name: Validate + apply (the gate; byte-for-byte preservation)
        run: |
          if [ ! -f patch.json ]; then
            echo "patch.json absent (secrets not yet wired) — nothing to validate."
            exit 0
          fi
          node scripts/freshness/validate.mjs state.json patch.json

      - name: Open an auto-land PR (if the sweep changed anything)
        env:
          GH_TOKEN: ${{ secrets.AUTOLAND_PAT }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No drift to fix — nothing to open."
            exit 0
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "AUTOLAND_PAT not set — skipping PR open (working tree changes left uncommitted)."
            exit 0
          fi
          # Append the run id so a same-day re-run can't collide on the branch.
          BRANCH="freshness/$(date +%Y-%m-%d)-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Site freshness: weekly drift sweep"
          git push -u origin "$BRANCH"
          # Ensure the `auto-land` label exists so `gh pr create --label` can't
          # fail the run if the label was never bootstrapped (enable.sh).
          gh label create auto-land --color "0E8A16" --description "Opt this PR into gated auto-merge once green + review-clear" --force || true
          gh pr create \
            --title "Site freshness: weekly drift sweep" \
            --body "Automated weekly drift sweep. Bounded copy edits to stale static claims, and append-only addenda on drifted field notes (original prose preserved byte-for-byte by the validator). Opened for auto-land review." \
            --label auto-land
