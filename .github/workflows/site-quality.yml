name: Site quality

# Link rot + performance regression watch. Link check is blocking;
# Lighthouse is advisory (continue-on-error) until budgets settle.

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 22 * * 0" # Mondays 06:30 SGT, after the weekly rebuild
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  links:
    name: Link check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Check links in built site
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-retries 2
            --accept 200..=299,403,429
            --exclude 'github\.com/rarebit-one/rarebit-ops'
            --exclude 'localhost'
            --root-dir ${{ github.workspace }}/dist
            dist
          fail: true

  lighthouse:
    name: Lighthouse (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
