name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Fork PRs are skipped: they don't receive secrets, so the job would fail anyway;
    # skipping avoids wasted runner minutes on external contributions.
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: rarebit-one/.github/.github/workflows/claude-code-review.yml@main
    secrets: inherit
