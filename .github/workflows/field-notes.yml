name: Field notes

# Weekly auto-publishing Field Note (Mon 06:00 SGT / Sun 22:00 UTC):
# gather (last 7 days — public PRs/releases in full detail; private work
# reduced to anonymized category counts inside the script) → draft (one
# claude-opus-4-8 call, grounded only in those facts) → validate (the SOLE
# pre-publish gate: hard-fails on any private blocklist identifier,
# off-allowlist URL, email/@handle, or dead internal link; no-ops a thin
# week) → open an `auto-land` PR with the markdown. There is NO human review
# between draft and publish, so validate.mjs is the only safety boundary; it is
# locked by scripts/field-notes/validate.test.mjs (run via `npm test` in CI).
#
# PR PATH (issue #29): instead of committing straight to main, a validated note
# is pushed to a `field-notes/<slug>` branch and opened as an `auto-land` PR via
# AUTOLAND_PAT, so CI + review-verdict actually run. The gated auto-land sweeper
# then merges it once green + review-clear — no separate branch-protection
# carve-out for a bot is needed.
#
# Missing any secret → the relevant step no-ops (exit 0) and nothing is
# committed, so the workflow stays green until secrets are wired up:
#   FEED_GITHUB_PAT · ANTHROPIC_API_KEY · AUTOLAND_PAT

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

# The branch push + PR are done with AUTOLAND_PAT (a real-user token), so CI and
# review-verdict trigger. The workflow's own GITHUB_TOKEN only needs read here.
permissions:
  contents: read

concurrency:
  group: field-notes
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FEED_GITHUB_PAT: ${{ secrets.FEED_GITHUB_PAT }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AUTOLAND_PAT: ${{ secrets.AUTOLAND_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the PAT so the branch push triggers CI + review-verdict (a
          # GITHUB_TOKEN push would not). Empty when the secret is unset — the
          # publish step below no-ops in that case, keeping the workflow green.
          token: ${{ secrets.AUTOLAND_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Gather (public detail + anonymized private aggregate)
        run: node scripts/field-notes/gather.mjs facts.json

      - name: Draft (one LLM call — grounded in the facts)
        run: node scripts/field-notes/draft.mjs facts.json draft.json

      - name: Validate + assemble (the sole pre-publish gate)
        run: |
          if [ ! -f draft.json ]; then
            echo "draft.json absent (secrets not yet wired) — skipping publish."
            exit 0
          fi
          node scripts/field-notes/validate.mjs facts.json draft.json src/content/field-notes/

      - name: Open an auto-land PR for the new note (if any)
        env:
          GH_TOKEN: ${{ secrets.AUTOLAND_PAT }}
        run: |
          if [ -z "$(git status --porcelain src/content/field-notes)" ]; then
            echo "No new note (thin week or no-op) — no branch, no PR."
            exit 0
          fi
          if [ -z "${AUTOLAND_PAT:-}" ]; then
            echo "AUTOLAND_PAT not set — cannot open a PR; skipping (note left uncommitted)."
            exit 0
          fi

          # Derive a branch from the new note's filename (its slug). validate.mjs
          # writes src/content/field-notes/<slug>.md (optionally -<date> on clash).
          note_file="$(git status --porcelain src/content/field-notes \
            | awk '{print $2}' | grep '\.md$' | head -n1)"
          slug="$(basename "$note_file" .md)"
          branch="field-notes/${slug}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add src/content/field-notes
          git commit -m "Field notes: weekly entry (${slug})"
          git push --set-upstream origin "$branch"

          gh pr create \
            --title "Field notes: ${slug}" \
            --body "Auto-drafted weekly Field Note (validated by scripts/field-notes/validate.mjs). Opened on the gated auto-land path (issue #29): CI + review-verdict run, then the sweeper merges once green + review-clear." \
            --label auto-land \
            --base main \
            --head "$branch"
