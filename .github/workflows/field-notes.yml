name: Field notes

# Weekly auto-publishing Field Note (Mon 06:00 SGT / Sun 22:00 UTC):
# gather (last 7 days — public PRs/releases in full detail; private work
# reduced to anonymized category counts inside the script) → draft (one OpenAI
# chat-completions call, model = OPENAI_MODEL repo var, default gpt-4o, grounded
# only in those facts) → validate (the SOLE
# pre-publish gate: hard-fails on any private blocklist identifier,
# off-allowlist URL, email/@handle, or dead internal link; no-ops a thin
# week) → open an `auto-land` PR with the markdown (NOT a direct push to main).
# There is NO human review between draft and publish, so validate.mjs is the
# only safety boundary; it is locked by scripts/field-notes/validate.test.mjs
# (run via `npm test` in CI).
#
# Publish mechanism: under gated auto-land (issue #29), main is branch-protected
# against direct pushes, so the note is committed to a branch `field-notes/<slug>`,
# pushed + opened as an `auto-land`-labeled PR via AUTOLAND_PAT. That makes CI +
# review-verdict.yml run on it; the auto-land sweeper merges it once green. Using
# AUTOLAND_PAT (a real-user token) for the push is what triggers those workflows.
#
# Missing any secret → the relevant step no-ops (exit 0) and nothing is
# published, so the workflow stays green until they are wired up:
#   FEED_GITHUB_PAT · OPENAI_API_KEY · AUTOLAND_PAT

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: field-notes
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FEED_GITHUB_PAT: ${{ secrets.FEED_GITHUB_PAT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      AUTOLAND_PAT: ${{ secrets.AUTOLAND_PAT }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Push with the real-user PAT so the branch push triggers CI +
          # review-verdict on the opened PR. Falls back to GITHUB_TOKEN when the
          # PAT is unset (the open-PR step then no-ops, so nothing is published).
          token: ${{ secrets.AUTOLAND_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Gather (public detail + anonymized private aggregate)
        run: node scripts/field-notes/gather.mjs facts.json

      - name: Draft (one LLM call — grounded in the facts)
        run: node scripts/field-notes/draft.mjs facts.json draft.json

      - name: Validate + assemble (the sole pre-publish gate)
        run: |
          if [ ! -f draft.json ]; then
            echo "draft.json absent (secrets not yet wired) — skipping publish."
            exit 0
          fi
          node scripts/field-notes/validate.mjs facts.json draft.json src/content/field-notes/

      - name: Open an auto-land PR with the new note (if any)
        env:
          GH_TOKEN: ${{ secrets.AUTOLAND_PAT }}
        run: |
          if [ -z "$(git status --porcelain src/content/field-notes)" ]; then
            echo "No new note (thin week or no-op) — nothing to publish."
            exit 0
          fi
          if [ -z "$AUTOLAND_PAT" ]; then
            echo "AUTOLAND_PAT not set — cannot push a branch / open a PR. Skipping publish."
            exit 0
          fi
          # Derive the slug from the new note's filename for the branch name.
          note_path="$(git status --porcelain src/content/field-notes | awk '{print $2}' | grep '\.md$' | head -n1)"
          slug="$(basename "$note_path" .md)"
          # The slug is usually unique, but guard against a same-day re-run
          # colliding on `git checkout -b` by appending the run id.
          branch="field-notes/${slug}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add src/content/field-notes
          git commit -m "Field notes: weekly entry (${slug})"
          # Push with AUTOLAND_PAT (the checkout token) so CI + review-verdict run.
          git push --set-upstream origin "$branch"
          # Ensure the `auto-land` label exists so `gh pr create --label` can't
          # fail the run if the label was never bootstrapped (enable.sh).
          gh label create auto-land --color "0E8A16" --description "Opt this PR into gated auto-merge once green + review-clear" --force || true
          # Open the PR labeled `auto-land` so the sweeper merges it once green.
          gh pr create \
            --title "Field notes: ${slug}" \
            --body "Auto-drafted weekly field note (passed the validate gate). Opened for gated auto-land — CI + review/clear must pass, then the sweeper merges it." \
            --base main \
            --head "$branch" \
            --label auto-land

      - name: Close the seed issues this note used
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Best-effort: only when a note was actually published (the note file
          # is committed) and the draft reported the seeds it drew on. A missing
          # draft.json, no usedSeedIssues, or a thin-week no-op simply skips.
          if [ ! -f draft.json ]; then
            echo "No draft.json — nothing to close."
            exit 0
          fi
          if [ -z "$(git log -1 --name-only --pretty=format: | grep '^src/content/field-notes/' || true)" ]; then
            echo "No new note committed this run — leaving seed issues open."
            exit 0
          fi
          issues=$(node -e 'const d=require("./draft.json");const a=Array.isArray(d.usedSeedIssues)?d.usedSeedIssues:[];process.stdout.write(a.filter(n=>Number.isInteger(n)&&n>0).join(" "))')
          if [ -z "$issues" ]; then
            echo "draft reported no used seed issues — nothing to close."
            exit 0
          fi
          for n in $issues; do
            gh issue close "$n" --comment "Used in this week's field note." || \
              echo "::warning::could not close seed issue #$n (already closed or missing)"
          done
