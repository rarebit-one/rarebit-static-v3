name: Field notes

# Weekly auto-publishing Field Note (Mon 06:00 SGT / Sun 22:00 UTC):
# gather (last 7 days — public PRs/releases in full detail; private work
# reduced to anonymized category counts inside the script) → draft (one
# OpenAI chat-completions call — model = OPENAI_MODEL repo var, default
# gpt-4o — grounded only in those facts) → validate (the SOLE
# pre-publish gate: hard-fails on any private blocklist identifier,
# off-allowlist URL, email/@handle, or dead internal link; no-ops a thin
# week) → auto-commit the markdown to main. There is NO human review between
# draft and publish, so validate.mjs is the only safety boundary; it is
# locked by scripts/field-notes/validate.test.mjs (run via `npm test` in CI).
#
# Missing any secret → the relevant step no-ops (exit 0) and nothing is
# committed, so the workflow stays green until both are wired up:
#   FEED_GITHUB_PAT · OPENAI_API_KEY
#
# NB: pushing the commit directly to main requires that branch protection
# permits the github-actions bot to push. If main is protected against direct
# pushes, the maintainer must allow the bot (or this workflow) in settings;
# otherwise the push step fails and the note is not published.

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: field-notes
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FEED_GITHUB_PAT: ${{ secrets.FEED_GITHUB_PAT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Read-only access to the private idea-seed notebook in DO Spaces so
      # gather can mine it for candidate angles (best-effort; absent → no seeds).
      # CHANNEL must match the notebook workflow so we read the same object.
      SPACES_KEY_ID: ${{ secrets.SPACES_KEY_ID }}
      SPACES_SECRET: ${{ secrets.SPACES_SECRET }}
      CHANNEL: ${{ vars.FARM_FEED_CHANNEL || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Gather (public detail + anonymized private aggregate)
        run: node scripts/field-notes/gather.mjs facts.json

      - name: Draft (one LLM call — grounded in the facts)
        run: node scripts/field-notes/draft.mjs facts.json draft.json

      - name: Validate + assemble (the sole pre-publish gate)
        run: |
          if [ ! -f draft.json ]; then
            echo "draft.json absent (secrets not yet wired) — skipping publish."
            exit 0
          fi
          node scripts/field-notes/validate.mjs facts.json draft.json src/content/field-notes/

      - name: Commit the new note (if any)
        run: |
          if [ -z "$(git status --porcelain src/content/field-notes)" ]; then
            echo "No new note (thin week or no-op) — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/field-notes
          git commit -m "Field notes: weekly entry"
          git push
