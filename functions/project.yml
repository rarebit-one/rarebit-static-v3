# DigitalOcean Functions project — the MCP server behind https://rarebit.one/mcp
#
# Deployed as a `functions` component of the rarebit-static-v3 App Platform app
# (see .do/app.yaml). The app's ingress rewrites /mcp → /mcp/server, which is
# this package/function pair.
#
# The app spec's envs (GITHUB_TOKEN secret + GITHUB_REPO) exist only in the
# *build* environment; the function's *runtime* env gets exactly what the
# `environment:` block below declares — the dollar-brace references
# interpolate at deploy time. Without this block process.env is empty at
# runtime. NB: the deploy parser scans this whole file (comments included)
# for dollar-brace tokens, so don't write one here.
packages:
  - name: mcp
    functions:
      - name: server
        runtime: nodejs:18
        web: raw
        environment:
          GITHUB_TOKEN: "${GITHUB_TOKEN}"
          GITHUB_REPO: "${GITHUB_REPO}"
        limits:
          timeout: 15000
          # Stateless string-serving — 128MB halves the GiB-s per call.
          memory: 128
