# DigitalOcean App Platform spec — rarebit.one static site (v3).
#
# Static Site tier (no container). DO's GitHub integration auto-builds and
# deploys on push to `main`. `.github/workflows/deploy.yml` then polls the DO
# API to surface deploy status back in GitHub.
#
# ⚠️ NEVER apply this file raw — `doctl apps update --spec` is a FULL-SPEC
# REPLACE, and this file deliberately omits the GITHUB_TOKEN secret (see
# below). Applying it verbatim wipes the token and every subsequent deploy
# fails at build (project.yml interpolates it). Dashboard env edits have the
# inverse trap: they regenerate the spec from the last good deployment,
# discarding spec changes that never went ACTIVE. Instead, merge into the
# LIVE spec (which carries the secret as a round-trippable EV[...] value):
#
#   doctl apps spec get <APP_ID> > /tmp/live.yaml
#   <edit /tmp/live.yaml to add your change>
#   doctl apps update <APP_ID> --spec /tmp/live.yaml && rm /tmp/live.yaml
#
# ...then mirror the change into this file for version control.
#
# The rarebit.one domains were cut over from the retired rarebit-static-v2 app
# (a domain can only be PRIMARY on one app at a time). The zone is DO-managed,
# so App Platform maintains the DNS records itself.
#
# The `mcp` functions component serves https://rarebit.one/mcp and
# https://rarebit.one/inquiry (ingress rewrites to /mcp/server and
# /mcp/inquiry — package `mcp`, functions `server` and `inquiry` under
# functions/). The GITHUB_TOKEN env var (fine-grained PAT, Issues read/write
# on GITHUB_REPO only — the inquiry inbox) is set on the live app only —
# never commit it here; without it both inquiry paths degrade to an
# email-fallback message.
name: rarebit-static-v3
region: sgp

static_sites:
  - name: web
    github:
      repo: rarebit-one/rarebit-static-v3
      branch: main
      deploy_on_push: true
    build_command: npm run build
    output_dir: dist
    environment_slug: node-js
    index_document: index.html
    error_document: 404.html

functions:
  - name: mcp
    source_dir: functions
    github:
      repo: rarebit-one/rarebit-static-v3
      branch: main
      deploy_on_push: true
    envs:
      - key: GITHUB_REPO
        scope: RUN_TIME
        value: rarebit-one/rarebit-ops

ingress:
  rules:
    - match:
        path:
          prefix: /mcp
      component:
        name: mcp
        rewrite: /mcp/server
    - match:
        path:
          prefix: /inquiry
      component:
        name: mcp
        rewrite: /mcp/inquiry
    - match:
        path:
          prefix: /
      component:
        name: web

domains:
  - domain: rarebit.one
    type: PRIMARY
    zone: rarebit.one
  - domain: www.rarebit.one
    type: ALIAS
    zone: rarebit.one
